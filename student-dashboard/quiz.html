<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quizzes — Edvora Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <style>body{font-family:Poppins,system-ui;background:#f4f6f9;padding-top:70px}.container-page{max-width:1000px;margin:auto}.navbar-custom{background:linear-gradient(135deg,#0d0d0d 5%,#1f8fff 100%)!important}.card{border-radius:12px}</style>
  </head>
  <body>
    <nav class="navbar navbar-custom fixed-top"><div class="container"><a class="navbar-brand text-white" href="student-dashboard.html">Edvora Tech</a></div></nav>

    <main class="container-page py-3">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex gap-3 align-items-center">
          <button class="btn btn-outline-secondary btn-sm" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
          <div><h1 class="h5 mb-0">Quizzes & Exams</h1><div class="muted small">Take quizzes and review results</div></div>
        </div>
        <a class="btn btn-primary btn-sm" href="start-quiz.html"><i class="bi bi-play-fill me-1"></i>Start New Quiz</a>
      </div>

      <div class="row g-3">
        <div class="col-md-6">
          <div class="card p-3">
            <h6 class="mb-1">HTML Basics Quiz</h6>
            <p class="muted small mb-2">10 questions • 15 minutes</p>
            <div class="d-flex justify-content-between"><small class="muted">Due: 2026-03-25</small><a class="btn btn-sm btn-primary" href="start-quiz.html">Start</a></div>
          </div>
        </div>

        <div class="col-12">
          <div class="card p-3">
            <h6>Recent Scores</h6>
            <table class="table mt-2 mb-0"><thead><tr><th>Quiz</th><th>Score</th><th>Date</th></tr></thead><tbody><tr><td>HTML Basics</td><td>9/10</td><td>2026-02-28</td></tr></tbody></table>
          </div>
        </div>
      </div>

      <footer class="mt-4 text-center muted small">© 2026 Edvora Tech</footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
