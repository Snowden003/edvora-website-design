<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Settings — Edvora Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>body{font-family:Poppins,system-ui;background:#f4f6f9;padding-top:70px}.container-page{max-width:900px;margin:auto}.navbar-custom{background:linear-gradient(135deg,#0d0d0d 5%,#1f8fff 100%)!important}.card{border-radius:12px}</style>
  </head>
  <body>
    <nav class="navbar navbar-custom fixed-top"><div class="container"><a class="navbar-brand text-white" href="student-dashboard.html">Edvora Tech</a></div></nav>

    <main class="container-page py-3">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex gap-3 align-items-center">
          <button class="btn btn-outline-secondary btn-sm" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
          <div><h1 class="h5 mb-0">Settings</h1><div class="muted small">Account & preferences</div></div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="alert('Saved (sample)')">Save</button>
      </div>

      <div class="card p-3">
        <h6>Preferences</h6>
        <div class="form-check form-switch my-2">
          <input class="form-check-input" id="emailNotif" type="checkbox" checked>
          <label class="form-check-label" for="emailNotif">Email notifications</label>
        </div>
        <div class="form-check form-switch my-2">
          <input class="form-check-input" id="darkMode" type="checkbox">
          <label class="form-check-label" for="darkMode">Dark mode (sample)</label>
        </div>

        <hr />

        <h6>Language</h6>
        <select class="form-select w-auto mt-2"><option value="en" selected>English</option><option value="fa">فارسی</option></select>
      </div>

      <footer class="mt-4 text-center muted small">© 2026 Edvora Tech</footer>
    </main>

    <script>
      document.getElementById('darkMode')?.addEventListener('change',function(){document.documentElement.style.filter=this.checked?'invert(0.98)':''});
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
