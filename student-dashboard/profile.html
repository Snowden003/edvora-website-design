<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile — Edvora Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <style>body{font-family:Poppins,system-ui;background:#f4f6f9;padding-top:70px}.container-page{max-width:900px;margin:auto}.navbar-custom{background:linear-gradient(135deg,#0d0d0d 5%,#1f8fff 100%)!important}.card{border-radius:12px}</style>
  </head>
  <body>
    <nav class="navbar navbar-custom fixed-top"><div class="container"><a class="navbar-brand text-white" href="student-dashboard.html">Edvora Tech</a></div></nav>

    <main class="container-page py-3">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex gap-3 align-items-center">
          <button class="btn btn-outline-secondary btn-sm" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
          <div><h1 class="h5 mb-0">Profile</h1><div class="muted small">Manage your account</div></div>
        </div>
        <button class="btn btn-outline-secondary btn-sm" onclick="document.getElementById('profileForm').requestSubmit()">Save</button>
      </div>

      <form id="profileForm" class="card p-3">
        <div class="row g-3">
          <div class="col-md-4 text-center">
            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200" alt="avatar" class="rounded-circle mb-2" style="width:120px;height:120px;object-fit:cover">
            <div><button type="button" class="btn btn-sm btn-outline-primary">Change</button></div>
          </div>
          <div class="col-md-8">
            <div class="mb-3"><label class="form-label">Full name</label><input class="form-control" value="John Doe"></div>
            <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" value="john@example.com"></div>
            <div class="mb-3"><label class="form-label">Phone</label><input class="form-control" type="tel"></div>
            <div class="mb-3"><label class="form-label">Bio</label><textarea class="form-control" rows="3">Passionate learner.</textarea></div>
          </div>
        </div>
      </form>

      <footer class="mt-4 text-center muted small">© 2026 Edvora Tech</footer>
    </main>

    <script>
      document.getElementById('profileForm').addEventListener('submit',function(e){e.preventDefault();alert('Profile saved (sample)')});
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
