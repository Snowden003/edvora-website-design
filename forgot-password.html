<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Edvora Tech</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
     <link href="assets/css/style.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-dark" style="background: linear-gradient(135deg, #0D0D0D 0%, #1F8FFF 100%);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-mortarboard-fill me-2"></i>Edvora
            </a>
        </div>
    </nav>

    <!-- Section -->
    <section class="flex-grow-1 d-flex align-items-center py-4"
       style="background: linear-gradient(135deg, #0D0D0D 0%, #1F8FFF 100%);">

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7">

                    <div class="card border-0 shadow-lg">
                        <div class="card-body p-5">

                            <!-- Title -->
                            <div class="text-center mb-4">
                                <h2 class="fw-bold" style="color: #1F8FFF;">Forgot Password?</h2>
                                <p class="text-muted">
                                    Enter your email and we'll send you a reset link.
                                </p>
                            </div>

                            <!-- Alert Messages -->
                            <div id="alertBox" class="alert d-none" role="alert"></div>

                            <!-- Form -->
                            <form id="forgotForm">

                                <div class="mb-4">
                                    <label for="email" class="form-label">Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="bi bi-envelope"></i>
                                        </span>
                                        <input type="email" class="form-control" id="email"
                                            placeholder="Enter your email" required>
                                    </div>
                                </div>

                                <button type="submit"
                                    class="btn btn-primary w-100 mb-3"
                                    style="background-color: #1F8FFF; border-color: #1F8FFF;">
                                    <i class="bi bi-send me-2"></i>Send Reset Link
                                </button>

                                <div class="text-center">
                                    <a href="login.html"
                                       class="fw-medium text-decoration-none"
                                       style="color: #1F8FFF;">
                                        <i class="link bi bi-arrow-left me-1"></i>
                                        Back to Login
                                    </a>
                                </div>

                            </form>

                        </div>
                    </div>

                </div>
            </div>
        </div>

    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Simple Frontend Logic -->
    <script>
        const form = document.getElementById("forgotForm");
        const alertBox = document.getElementById("alertBox");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();

            if (!email) {
                showAlert("Please enter your email address.", "danger");
                return;
            }

            // Demo success message
            showAlert(
                "If this email exists, a reset link has been sent.",
                "success"
            );

            form.reset();
        });

        function showAlert(message, type) {
            alertBox.className = `alert alert-${type}`;
            alertBox.innerText = message;
            alertBox.classList.remove("d-none");
        }
    </script>

</body>
</html>
